<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บัญชีกลุ่มงานดอกไม้ - ครูเจี๊ยบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d63384; /* สีชมพูดอกไม้ */
            --bg: #fff0f6;
            --success: #198754;
            --danger: #dc3545;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        /* การ์ดแสดงยอดเงิน */
        .summary-card {
            background: linear-gradient(135deg, #f8d7da 0%, #fce4ec 100%);
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.1em; }
        .total-balance { font-size: 1.5em; font-weight: bold; color: var(--primary); border-top: 1px solid #ccc; padding-top: 10px; margin-top: 5px; }
        .member-share { font-size: 0.9em; color: #666; text-align: right; margin-top: 5px; }

        /* ฟอร์มกรอกข้อมูล */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Sarabun', sans-serif;
            box-sizing: border-box;
        }
        .btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-add:hover { background-color: #b02a6b; }

        /* ตารางรายการ */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #555; }
        .amount-in { color: var(--success); font-weight: bold; }
        .amount-out { color: var(--danger); font-weight: bold; }
        
        .delete-btn {
            background: none; border: none; color: #999; cursor: pointer; font-size: 1.2em;
        }
        .delete-btn:hover { color: var(--danger); }

        /* ปุ่มสรุปส่งไลน์ */
        .btn-line {
            background-color: #06c755;
            color: white;
            margin-top: 20px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌸 บัญชีกลุ่มงานดอกไม้ 🌸</h2>

    <div class="summary-card">
        <div class="summary-row">
            <span>รายรับรวม:</span>
            <span style="color:var(--success)" id="totalIncome">0</span>
        </div>
        <div class="summary-row">
            <span>รายจ่ายรวม:</span>
            <span style="color:var(--danger)" id="totalExpense">0</span>
        </div>
        <div class="summary-row total-balance">
            <span>คงเหลือสุทธิ:</span>
            <span id="balance">0</span>
        </div>
        <div class="member-share">
            (เฉลี่ยกำไร 12 คน: <span id="sharePerPerson">0</span> บาท/คน)
        </div>
    </div>

    <div style="background: #fafafa; padding: 15px; border-radius: 10px;">
        <div class="input-group">
            <label>รายการ (เช่น เงินลงทุน, ซื้อลวด, ค่ากระดาษ)</label>
            <input type="text" id="desc" placeholder="กรอกชื่อรายการ...">
        </div>
        <div class="input-group">
            <label>จำนวนเงิน (บาท)</label>
            <input type="number" id="amount" placeholder="0.00">
        </div>
        <div class="input-group">
            <label>ประเภท</label>
            <select id="type">
                <option value="income">รายรับ / เงินเข้า (Income)</option>
                <option value="expense">รายจ่าย / เงินออก (Expense)</option>
            </select>
        </div>
        <button class="btn-add" onclick="addTransaction()">+ บันทึกรายการ</button>
    </div>

    <button class="btn-line" onclick="copyForLine()">📋 คัดลอกสรุปเพื่อส่งไลน์กลุ่ม</button>

    <h3>รายการล่าสุด</h3>
    <table>
        <thead>
            <tr>
                <th>รายการ</th>
                <th style="text-align:right;">จำนวน</th>
                <th style="width:30px;"></th>
            </tr>
        </thead>
        <tbody id="list">
            </tbody>
    </table>
</div>

<script>
    // โหลดข้อมูลเก่าถ้ามี
    let transactions = JSON.parse(localStorage.getItem('flowerTransactions')) || [];

    // ฟังก์ชันเริ่มทำงานเมื่อเปิดเว็บ
    window.onload = function() {
        render();
    };

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;

        if (desc.trim() === '' || isNaN(amount)) {
            alert('กรุณากรอกรายการและจำนวนเงินให้ถูกต้องค่ะ');
            return;
        }

        const transaction = {
            id: Date.now(),
            desc: desc,
            amount: amount,
            type: type,
            date: new Date().toLocaleDateString('th-TH')
        };

        transactions.push(transaction);
        saveAndRender();
        
        // ล้างช่องกรอก
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteTransaction(id) {
        if(confirm('ต้องการลบรายการนี้ใช่ไหมคะ?')) {
            transactions = transactions.filter(t => t.id !== id);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('flowerTransactions', JSON.stringify(transactions));
        render();
    }

    function render() {
        const list = document.getElementById('list');
        const incomeEl = document.getElementById('totalIncome');
        const expenseEl = document.getElementById('totalExpense');
        const balanceEl = document.getElementById('balance');
        const shareEl = document.getElementById('sharePerPerson');

        list.innerHTML = '';
        
        let income = 0;
        let expense = 0;

        // เรียงจากใหม่ไปเก่า
        transactions.slice().reverse().forEach(t => {
            const row = document.createElement('tr');
            const isIncome = t.type === 'income';
            
            if (isIncome) income += t.amount;
            else expense += t.amount;

            row.innerHTML = `
                <td>
                    <div style="font-weight:bold;">${t.desc}</div>
                    <div style="font-size:0.8em; color:#888;">${t.date}</div>
                </td>
                <td style="text-align:right;" class="${isIncome ? 'amount-in' : 'amount-out'}">
                    ${isIncome ? '+' : '-'}${t.amount.toLocaleString()}
                </td>
                <td><button class="delete-btn" onclick="deleteTransaction(${t.id})">×</button></td>
            `;
            list.appendChild(row);
        });

        const balance = income - expense;
        const share = balance / 12; // หาร 12 คน

        incomeEl.innerText = income.toLocaleString() + ' ฿';
        expenseEl.innerText = expense.toLocaleString() + ' ฿';
        balanceEl.innerText = balance.toLocaleString() + ' ฿';
        shareEl.innerText = share.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function copyForLine() {
        let income = 0;
        let expense = 0;
        transactions.forEach(t => {
            if (t.type === 'income') income += t.amount;
            else expense += t.amount;
        });
        const balance = income - expense;
        const share = balance / 12;

        let text = `🌸 *สรุปบัญชีกลุ่มงานดอกไม้* 🌸\n`;
        text += `📅 อัพเดท: ${new Date().toLocaleDateString('th-TH')}\n`;
        text += `------------------\n`;
        text += `💰 เงินเข้าสะสม: ${income.toLocaleString()} บ.\n`;
        text += `💸 จ่ายออกสะสม: ${expense.toLocaleString()} บ.\n`;
        text += `------------------\n`;
        text += `✅ *คงเหลือสุทธิ: ${balance.toLocaleString()} บ.*\n`;
        text += `(หาร 12 คน = คนละ ${share.toLocaleString(undefined, {maximumFractionDigits:0})} บ.)\n`;
        text += `------------------\n`;
        text += `📝 *รายการล่าสุด:*\n`;
        
        // เอาแค่ 5 รายการล่าสุด
        const recent = transactions.slice().reverse().slice(0, 5);
        recent.forEach(t => {
            text += `- ${t.desc}: ${t.type == 'income' ? '+' : '-'}${t.amount}\n`;
        });
        
        navigator.clipboard.writeText(text).then(() => {
            alert('คัดลอกข้อความแล้ว! \nนำไปกดวาง (Paste) ในไลน์กลุ่มได้เลยค่ะ');
        });
    }
</script>

</body>
</html>
